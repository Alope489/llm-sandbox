[pytest]
markers =
    integration: E2E integration tests (live API, real LLM; zero mocking; require API keys)
    linear: linear pipeline integration tests (extractor, processor, reasoning, orchestrator)
    multi: multi/knowledge-base integration tests (index, search, complete_with_knowledge, file_store, kb_agent)
    sim: simulation agent integration tests
    wrapper: base LLM wrapper integration tests
testpaths = tests
python_files = test_*.py
python_functions = test_*
